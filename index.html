    <style>
      /* Brand display font used for the HOTNDOGS wordmark in the Figma source.
         Super Caramel is licensed and cannot come from a CDN — drop the file at
         public/fonts/SuperCaramel.woff2 (and/or .otf) and it is picked up
         automatically. Until then the stack falls back to Montserrat. */
      @font-face {
        font-family: "Super Caramel";
        src: url("%BASE_URL%fonts/SuperCaramel.woff2") format("woff2"),
             url("%BASE_URL%fonts/SuperCaramel.otf") format("opentype");
        font-weight: 400;
        font-display: swap;
      }
    </style>

  </body>
